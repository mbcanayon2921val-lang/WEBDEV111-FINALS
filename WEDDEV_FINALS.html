<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARJO X OB Motorcycle Parts & Services</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Inter,sans-serif;background:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.85)),url('https://images.unsplash.com/photo-1558981806-ec527fa84c39?auto=format&fit=crop&w=1920&q=80');background-size:cover;background-attachment:fixed;background-position:center;color:#e5e5e5}
header{position:fixed;width:100%;top:0;background:rgba(10,10,10,0.75);backdrop-filter:blur(14px);padding:15px 40px;display:flex;justify-content:space-between;align-items:center;z-index:1000;border-bottom:1px solid rgba(250,204,21,0.2)}
header h1{margin:0;font-size:20px;color:#facc15;letter-spacing:1px}
nav a{margin-left:20px;color:#e5e5e5;text-decoration:none;font-weight:500;transition:0.2s}
nav a:hover{color:#facc15;transform:translateY(-2px)}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px}
.hero h2{font-size:52px;margin:0;color:#fff;text-shadow:0 10px 30px rgba(0,0,0,0.7)}
.hero button{padding:14px 28px;border:none;background:#facc15;color:#000;font-weight:700;border-radius:30px;cursor:pointer;transition:0.3s;box-shadow:0 10px 30px rgba(250,204,21,0.2)}
.hero button:hover{transform:scale(1.05)}
.section{padding:100px 40px;text-align:center}
.section h2{font-size:34px;margin-bottom:40px;color:#facc15}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:25px}
.card{background:rgba(17,17,17,0.7);backdrop-filter:blur(10px);padding:25px;border-radius:15px;border:1px solid rgba(255,255,255,0.05);transition:0.3s}
.card:hover{transform:translateY(-10px);border-color:#facc15;box-shadow:0 20px 40px rgba(0,0,0,0.4)}
.card img{width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:15px}
.card h3{margin-top:0;color:#fff}
footer{background:#000;padding:40px;text-align:center;color:#777}
input,textarea{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #333;background:#0f0f0f;color:#fff;outline:none}
input:focus,textarea:focus{border-color:#facc15}
button.submit{padding:12px 25px;background:#facc15;border:none;color:#000;font-weight:700;border-radius:25px;cursor:pointer;transition:0.3s}
button.submit:hover{transform:scale(1.05)}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center}
.modal-content{background:rgba(17,17,17,0.9);backdrop-filter:blur(12px);padding:30px;border-radius:15px;width:320px;border:1px solid rgba(250,204,21,0.2)}
.close{float:right;cursor:pointer;color:#aaa;font-size:20px}
.close:hover{color:#facc15}
</style>
</head>
<body>
<header>
<h1>ARJO X OB</h1>
<nav>
<a href="#home">Home</a>
<a href="#services">Services</a>
<a href="#products">Products</a>
<a href="#contact">Contact</a>
<a href="#" onclick="openModal('loginModal')">Login</a>
<a href="#" onclick="openModal('signupModal')">Sign Up</a>
</nav>
</header>

<section class="hero" id="home">
<h2>Premium Motorcycle Parts & Services</h2>
<button onclick="scrollToSection('contact')">Book Service</button>
</section>

<section class="section" id="services">
<h2>Our Services</h2>
<div class="cards">
<div class="card"><img src="engines.webp"><h3>Engine Repair</h3></div>
<div class="card"><img src="maint.webp"><h3>Maintenance</h3></div>
<div class="card"><img src="brake.webp"><h3>Brake Systems</h3></div>
<div class="card"><img src="cus.webp"><h3>Customization</h3></div>
</div>
</section>

<section class="section" id="products">
<h2>Products</h2>
<div class="cards">
<div class="card"><img src="tire.webp"><h3>Performance Tires</h3></div>
<div class="card"><img src="disk.webp"><h3>Brake Components</h3></div>
<div class="card"><img src="mot.webp"><h3>Engine Oils</h3></div>
<div class="card"><img src="spark.webp"><h3>Spark Systems</h3></div>
</div>
</section>

<section class="section" id="contact">
<h2>Contact</h2>
<form onsubmit="submitForm(event)">
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<textarea required></textarea>
<button class="submit">Send</button>
</form>
<p id="msg"></p>
</section>

<footer>
<p>© 2026 ARJO X OB</p>
</footer>

<div class="modal" id="loginModal">
<div class="modal-content">
<span class="close" onclick="closeModal('loginModal')">&times;</span>
<h3>Login</h3>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()" class="submit">Login</button>
<p id="loginMsg"></p>
</div>
</div>

<div class="modal" id="signupModal">
<div class="modal-content">
<span class="close" onclick="closeModal('signupModal')">&times;</span>
<h3>Sign Up</h3>
<input type="email" id="signupEmail" placeholder="Email">
<input type="password" id="signupPass" placeholder="Password">
<label><input type="checkbox" id="terms"> I agree to Terms & Conditions</label>
<button onclick="signup()" class="submit">Sign Up</button>
<p id="signupMsg"></p>
</div>
</div>

<script>
function scrollToSection(id){document.getElementById(id).scrollIntoView({behavior:'smooth'})}
function submitForm(e){e.preventDefault();document.getElementById('msg').innerText='Message sent'}
function openModal(id){document.getElementById(id).style.display='flex'}
function closeModal(id){document.getElementById(id).style.display='none'}
function signup(){let email=document.getElementById('signupEmail').value;let pass=document.getElementById('signupPass').value;let terms=document.getElementById('terms').checked;if(!terms){document.getElementById('signupMsg').innerText='Agree to terms';return}localStorage.setItem(email,pass);document.getElementById('signupMsg').innerText='Account created'}
function login(){let email=document.getElementById('loginEmail').value;let pass=document.getElementById('loginPass').value;let stored=localStorage.getItem(email);if(stored===pass){document.getElementById('loginMsg').innerText='Login success'}else{document.getElementById('loginMsg').innerText='Invalid credentials'}}
</script>
</body>
</html>
